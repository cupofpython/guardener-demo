# Run the Guardener

name: Guarden my Dockerfile

# Manual run, provide group ID and desired tag at runtime
# Verify that the identity secret is added to the repository secrets before running
on:
  workflow_dispatch:
    secrets:
      GUARDENER_DEMO_CHAINCTL_IDENTITY:
        required: true
    inputs:
      NAMESPACE:
        required: true
        type: string
      IMAGE_TAG:
        required: true
        type: string
      GROUP:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: guardener-demo

jobs:
  # Run the Guardener to migrate the Dockerfile
  run-guardener:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup chainctl
        uses: chainguard-dev/setup-chainctl@v0.5.1

      - name: Get GitHub OIDC token
        id: oidc
        shell: bash
        run: |
          TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r .value)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run guardener on Dockerfile
        shell: bash
        run: |
          chainctl auth login \
            --identity "${{ secrets.GUARDENER_DEMO_CHAINCTL_IDENTITY }}" \
            --identity-token "${{ steps.oidc.outputs.token }}"

          chainctl agent dockerfile build -f Dockerfile -t myapp:cg \
            --group "${{ inputs.GROUP }}" \
            --non-interactive

      - name: Save migrated Dockerfile
        uses: actions/upload-artifact@v4
        with:
          name: Dockerfile.migrated
          path: ./Dockerfile.migrated
  
  # Build and push the migrated image to GitHub Container Registry
  build-and-push-image:
    needs: run-guardener
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Get GitHub OIDC token
        id: oidc
        shell: bash
        run: |
          TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r .value)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Setup chainctl
        uses: chainguard-dev/setup-chainctl@v0.5.1
      
      - name: Auth with chainctl using OIDC token
        shell: bash
        run: |
          chainctl auth login \
            --identity "${{ secrets.GUARDENER_DEMO_CHAINCTL_IDENTITY }}" \
            --identity-token "${{ steps.oidc.outputs.token }}"

      - name: Download migrated Dockerfile
        uses: actions/download-artifact@v4
        with:
          name: Dockerfile.migrated
          path: ./artifacts

      - name: Build and push image with new Dockerfile
        run: |
          docker build . -f ./artifacts/Dockerfile.migrated -t ghcr.io/${{ inputs.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ inputs.IMAGE_TAG }}
          docker push ghcr.io/${{ inputs.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ inputs.IMAGE_TAG }}

      - name: Scan the image with Grype
        uses: anchore/scan-action@v7
        with:
          image: ghcr.io/${{ inputs.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ inputs.IMAGE_TAG }}
          fail-build: false
          output-format: json
          output-file: scan-results.json

      - name: Show Grype scan results
        run: |
          cat scan-results.json | jq '[.matches[] | {severity: .vulnerability.severity, id: .vulnerability.id, package: .artifact.name}]'